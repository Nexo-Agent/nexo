<svg xmlns="http://www.w3.org/2000/svg" viewBox="80 80 864 864" width="864" height="864" role="img" aria-labelledby="title desc">
  <title id="title">Cogito Studio Logo</title>
  <desc id="desc">A cognitive forge mark combining a C-shaped reasoning loop, a studio canvas, and a spark node.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="96" x2="884" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF6FF"/>
      <stop offset="0.45" stop-color="#BFE4FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="loop" x1="256" y1="204" x2="798" y2="826" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="spark" x1="560" y1="292" x2="720" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="80" y="80" width="864" height="864" rx="220" fill="url(#bg)" filter="url(#softShadow)"/>

  <!-- studio/canvas surface -->
  <rect x="270" y="286" width="484" height="452" rx="116" fill="#FFFFFF" opacity="0.94"/>
  <path d="M333 392h248M333 512h162M333 632h296" fill="none" stroke="#93C5FD" stroke-width="28" stroke-linecap="round" opacity="0.78"/>

  <!-- cognitive C loop -->
  <path d="M715 706C662 756 590 786 512 786C358 786 232 660 232 506C232 352 358 226 512 226C604 226 686 270 737 338" fill="none" stroke="url(#loop)" stroke-width="92" stroke-linecap="round"/>

  <!-- forge/studio diagonal craft stroke -->
  <path d="M398 682L690 390" fill="none" stroke="#0F172A" stroke-width="62" stroke-linecap="round" opacity="0.92"/>
  <path d="M442 638L646 434" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linecap="round" opacity="0.92"/>

  <!-- spark node: cognition + creation -->
  <circle cx="702" cy="332" r="88" fill="url(#spark)"/>
  <path d="M702 270v124M640 332h124M658 288l88 88M746 288l-88 88" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" opacity="0.95"/>
</svg>
